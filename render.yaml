services:
  - type: web
    name: kust-rag-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: kust-docs
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false